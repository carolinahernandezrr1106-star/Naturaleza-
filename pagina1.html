<!DOCTYPE html>
<html>
<head>
<title>Flora</title>

<style>
body{
font-family:Arial;
background:#e8ffe8;
text-align:center;
}

h1{
font-family:cursive;
color:darkgreen;
}

h2{
font-family:cursive;
color:green;
}

.caja{
background:white;
padding:20px;
border-radius:15px;
max-width:700px;
margin:auto;
box-shadow:0 0 10px gray;
}

button{
padding:10px 20px;
margin:10px;
border-radius:10px;
cursor:pointer;
}

img{
width:300px;
border-radius:15px;
margin:10px;
cursor:pointer;
}
</style>

<script>

var flora = {
  "nombre": "Flora",
  "dato": "Algunos árboles pueden vivir miles de años."
};

function mostrarDato(){
alert("Las plantas producen gran parte del oxígeno que respiramos.");
}

function verJSON(){
alert(
"Tema: " + flora.nombre +
"\nDato: " + flora.dato
);
}

function mostrarVideo(){
document.getElementById("videoFlora").style.display = "block";
}

</script>

</head>

<body>

<div class="caja">

<h1> Flora </h1>

<img src="flora1C.jpg" alt="Flora" onclick="mostrarVideo()">

<p><b>Haz clic </b></p>

<div id="videoFlora" style="display:none;">

<video width="350" controls>
<source src="flora.mp4" type="video/mp4">
Tu navegador no soporta videos.
</video>

</div>

<p>
La flora está formada por todas las plantas que habitan una región.
</p>

<h2>Dato Curioso</h2>

<p>
Algunas especies de árboles pueden vivir miles de años.
</p>

<button onclick="mostrarDato()">Ver Curiosidad</button>

<button onclick="verJSON()">Ver Dato JSON</button>

<br><br>

<a href="menu.html">⬅ Volver al Menú</a>

</div>

</body>
</html>
